apiVersion: apps/v1
kind: Deployment
metadata:
  name: merch-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merch
  template:
    metadata:
      labels:
        app: merch
    spec:
      containers:
      - name: merch-container
        image: merch-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: merch-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: merch
