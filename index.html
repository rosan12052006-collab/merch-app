<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Merch Co.</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        header { background: #333; color: white; padding: 1rem; text-align: center; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; width: 250px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Elite Merch Co.</h1>
        <p>Premium quality gadgets and apparel for creators.</p>
    </header>
    <div class="container">
        <div class="card">
            <h3>Classic Hoodie</h3>
            <p>Heavyweight cotton, perfect for coding sessions.</p>
            <p class="price">$45.00</p>
        </div>
        <div class="card">
            <h3>Tech Backpack</h3>
            <p>Water-resistant with a 16-inch laptop sleeve.</p>
            <p class="price">$85.00</p>
        </div>
    </div>
</body>
</html>
